name: Build Native Binaries
on:
  push:
    tags:
      - 'v*' # Triggers when you push a tag like v1.0.0

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This creates 3 parallel builds
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Build Native Binary with Maven
        run: mvn -Pnative native:compile -DskipTests

      - name: Rename binary for upload
        shell: bash
        run: |
          # Handles .exe extension for Windows vs No extension for Unix
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv target/my-app.exe my-app-windows.exe
          elif [ "${{ runner.os }}" == "macOS" ]; then
            mv target/my-app my-app-macos
          else
            mv target/my-app my-app-linux
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            my-app-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
